training:
  base_model: "Qwen/Qwen2.5-1.5B"
  output_dir: "hajeen_model/checkpoints"
  method: "LoRA"

  lora:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"

  hyperparams:
    num_epochs: 3
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 4
    gradient_accumulation_steps: 8
    learning_rate: 2.0e-4
    warmup_ratio: 0.03
    lr_scheduler_type: "cosine"
    weight_decay: 0.01
    max_grad_norm: 1.0
    max_seq_length: 2048
    fp16: true
    bf16: false
    seed: 42

  checkpointing:
    save_steps: 200
    eval_steps: 100
    logging_steps: 10
    save_total_limit: 5
    load_best_model_at_end: true
    metric_for_best_model: "eval_loss"

  data:
    train_split: 0.9
    eval_split: 0.1
    text_field: "text"
    shuffle: true
    min_length: 50
    max_length: 2048

  resources:
    min_gpu_memory_gb: 8
    recommended_gpu: "RTX 3090 / A100"
    estimated_time_hours: 2

data_requirements:
  minimum_samples: 1000
  recommended_samples: 10000
  current_samples: 31
  status: "insufficient — need more data before training"
  next_steps:
    - "جمع المزيد من مقالات الأخبار العربية"
    - "استخدام data_engine لجلب مقالات من مصادر RSS"
    - "إضافة قنوات جديدة"
    - "تشغيل Fine-Tuning بعد الوصول إلى 1000+ سجل"
