# ═══════════════════════════════════════════════════════
# configs/pipelines.yaml — Pipeline Definitions
# Section 5.17
# ═══════════════════════════════════════════════════════

pipelines:
  # Default news pipeline
  news_pipeline:
    name: "News Pipeline"
    source_id: "news"
    allowed_languages:
      - ar
      - en
    stages:
      - name: fetch
        enabled: true
      - name: clean
        enabled: true
        use_trafilatura: true
      - name: filter
        enabled: true
      - name: enrich
        enabled: true
      - name: transform
        enabled: true
        chunker:
          strategy: "paragraph"
          chunk_size: 512
          overlap: 64
      - name: store
        enabled: true
        local_path: "./data/processed/news"

  # Social media pipeline (short content)
  social_pipeline:
    name: "Social Pipeline"
    source_id: "social"
    allowed_languages:
      - ar
      - en
    stages:
      - name: fetch
        enabled: true
      - name: clean
        enabled: true
        use_trafilatura: false
      - name: filter
        enabled: true
      - name: enrich
        enabled: true
      - name: transform
        enabled: true
        chunker:
          strategy: "sentence"
          chunk_size: 256
          overlap: 32
      - name: store
        enabled: true
        local_path: "./data/processed/social"

  # Custom template pipeline
  custom_template:
    name: "Custom Pipeline"
    source_id: "custom"
    allowed_languages:
      - ar
      - en
    stages:
      - name: fetch
        enabled: true
      - name: clean
        enabled: true
      - name: filter
        enabled: true
      - name: enrich
        enabled: true
      - name: transform
        enabled: true
      - name: store
        enabled: true
