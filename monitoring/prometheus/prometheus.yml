# ══════════════════════════════════════════════════════════════════════════════
# Prometheus Configuration — Hajeen AI Platform
# ══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    platform: "hajeen-ai"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:

  # ── Hajeen API ─────────────────────────────────────────────────────────────
  - job_name: "hajeen-api"
    static_configs:
      - targets: ["hajeen-api:8000"]
    metrics_path: "/api/v1/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  # ── Prometheus Self ────────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Redis ──────────────────────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 15s

  # ── Node Exporter (system metrics) ────────────────────────────────────────
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Celery Workers ─────────────────────────────────────────────────────────
  - job_name: "celery"
    static_configs:
      - targets: ["celery-worker:9540"]
    scrape_interval: 30s
