global:
  imageRegistry: ghcr.io
  imageOrg: hajeen
  imageTag: "1.0.0"
  pullPolicy: Always
  namespace: hajeen-platform

api:
  replicaCount: 3
  image:
    repository: hajeen/hajeen-api
    tag: ""
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  env:
    LOG_LEVEL: INFO
    WORKERS: "4"

worker:
  replicaCount: 4
  image:
    repository: hajeen/hajeen-worker
    tag: ""
  queues: default,low
  concurrency: 4
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 50

inference:
  enabled: true
  replicaCount: 2
  image:
    repository: hajeen/hajeen-inference
    tag: ""
  gpu:
    enabled: true
    count: 1
    type: nvidia.com/gpu
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 16Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.hajeen.ai
      paths:
        - path: /api/
          pathType: Prefix
  tls:
    - secretName: hajeen-tls
      hosts:
        - api.hajeen.ai

postgresql:
  enabled: true
  auth:
    database: hajeen_db
    username: hajeen
    existingSecret: hajeen-secrets
    secretKeys:
      userPasswordKey: DATABASE_PASSWORD
  primary:
    persistence:
      enabled: true
      size: 100Gi
      storageClass: fast-ssd
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "4"
        memory: 8Gi

redis:
  enabled: true
  auth:
    existingSecret: hajeen-secrets
    existingSecretPasswordKey: REDIS_PASSWORD
  master:
    persistence:
      enabled: true
      size: 10Gi
  replica:
    replicaCount: 2

monitoring:
  prometheus:
    enabled: true
  grafana:
    enabled: true
  loki:
    enabled: true
  tempo:
    enabled: true

storage:
  models:
    enabled: true
    size: 500Gi
    storageClass: fast-nfs
    accessMode: ReadWriteMany
  data:
    enabled: true
    size: 1Ti
    storageClass: standard-ssd
    accessMode: ReadWriteOnce

secrets:
  existingSecret: hajeen-secrets
  keys:
    databaseUrl: DATABASE_URL
    redisUrl: REDIS_URL
    secretKey: SECRET_KEY
    jwtSecret: JWT_SECRET
    encryptionKey: ENCRYPTION_KEY
