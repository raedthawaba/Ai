version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# Hajeen AI Platform — Docker Compose Production Infrastructure
# ══════════════════════════════════════════════════════════════════════════════
# تشغيل: docker compose up -d
# إيقاف: docker compose down
# تشغيل مع GPU: docker compose --profile gpu up -d
# ══════════════════════════════════════════════════════════════════════════════

x-common-env: &common-env
  TZ: Asia/Riyadh
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

networks:
  hajeen-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  faiss_data:
  logs_data:
  grafana_data:
  prometheus_data:
  nginx_certs:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_DB: hajeen_db
      POSTGRES_USER: hajeen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hajeen_pass_change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - hajeen-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hajeen -d hajeen_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis (Main + Cache + Queue) ───────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    <<: [*restart, *logging]
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --databases 16
      --requirepass ${REDIS_PASSWORD:-redis_pass_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hajeen-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (Local LLM Server) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    <<: [*restart, *logging]
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_ORIGINS: "*"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_NUM_PARALLEL: "4"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - hajeen-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Ollama with GPU ────────────────────────────────────────────────────────
  ollama-gpu:
    image: ollama/ollama:latest
    profiles: ["gpu"]
    <<: [*restart, *logging]
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_ORIGINS: "*"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - hajeen-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Hajeen FastAPI Application ─────────────────────────────────────────────
  hajeen-api:
    build:
      context: ./hajeen_platform
      dockerfile: ../Dockerfile
      args:
        ENVIRONMENT: production
    <<: [*restart, *logging]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://hajeen:${POSTGRES_PASSWORD:-hajeen_pass_change_me}@postgres:5432/hajeen_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/0
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/1
      REDIS_QUEUE_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET:-hajeen-jwt-secret-change-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-HajeenAdmin2024!}
      DEFAULT_LLM_PROVIDER: ollama
      DEFAULT_MODEL: mistral:7b
      ENVIRONMENT: production
      PORT: "8000"
    volumes:
      - faiss_data:/app/storage_data
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    networks:
      - hajeen-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./hajeen_platform
      dockerfile: ../Dockerfile
    <<: [*restart, *logging]
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4 -Q default,inference,embedding,ingestion
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://hajeen:${POSTGRES_PASSWORD:-hajeen_pass_change_me}@postgres:5432/hajeen_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/3
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/4
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - faiss_data:/app/storage_data
      - logs_data:/app/logs
    networks:
      - hajeen-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Celery Beat (Scheduler) ────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./hajeen_platform
      dockerfile: ../Dockerfile
    <<: [*restart, *logging]
    command: celery -A workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *common-env
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379/3
      DATABASE_URL: postgresql+asyncpg://hajeen:${POSTGRES_PASSWORD:-hajeen_pass_change_me}@postgres:5432/hajeen_db
    networks:
      - hajeen-net
    depends_on:
      redis:
        condition: service_healthy

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: [*restart, *logging]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
      - logs_data:/var/log/nginx
    networks:
      - hajeen-net
    depends_on:
      hajeen-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    <<: [*restart, *logging]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hajeen-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    <<: [*restart, *logging]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_pass_change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    networks:
      - hajeen-net
    depends_on:
      - prometheus

  # ── Redis Exporter (Prometheus metrics) ───────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    <<: [*restart, *logging]
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass_change_me}
    networks:
      - hajeen-net
    depends_on:
      - redis

  # ── PostgreSQL Exporter ────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    <<: [*restart, *logging]
    environment:
      DATA_SOURCE_NAME: "postgresql://hajeen:${POSTGRES_PASSWORD:-hajeen_pass_change_me}@postgres:5432/hajeen_db?sslmode=disable"
    networks:
      - hajeen-net
    depends_on:
      postgres:
        condition: service_healthy
