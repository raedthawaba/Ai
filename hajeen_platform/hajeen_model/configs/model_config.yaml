model:
  name: "Hajeen Model v1"
  version: "1.0.0"
  base_model: "qwen2.5:1.5b"
  description: "نموذج لغوي محلي مخصص لمنصة حجين — Arabic + English"
  language: ["ar", "en"]
  created: "2026-06-02"
  author: "Hajeen Platform"

inference:
  provider: "ollama"
  ollama_base_url: "http://localhost:11434"
  ollama_model: "qwen2.5:1.5b"
  temperature: 0.7
  max_tokens: 1024
  top_p: 0.95
  context_length: 4096
  timeout: 60.0

fallback:
  enabled: true
  provider: "mock"
  reason: "Used when Ollama is unavailable"

system_prompt: |
  أنت Hajeen Model v1، مساعد ذكي متخصص في تحليل الأخبار والمعلومات باللغتين العربية والإنجليزية.
  أجب بدقة ووضوح، وكن مفيداً ومختصراً. إذا لم تعرف الإجابة، قل ذلك بوضوح.

capabilities:
  - "Arabic NLP"
  - "English NLP"
  - "News Analysis"
  - "Question Answering"
  - "Text Summarization"
  - "RAG Integration"
  - "Multi-turn Conversation"
