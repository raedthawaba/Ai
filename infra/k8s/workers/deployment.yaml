apiVersion: apps/v1
kind: Deployment
metadata:
  name: hajeen-worker
  namespace: hajeen-platform
  labels:
    app: hajeen-worker
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hajeen-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: hajeen-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: worker
        image: hajeen-platform/worker:latest
        imagePullPolicy: Always
        env:
        - name: QUEUES
          value: "default,low"
        - name: CONCURRENCY
          value: "4"
        envFrom:
        - configMapRef:
            name: hajeen-app-config
        - secretRef:
            name: hajeen-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "from workers.health import check_worker; check_worker()"
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        volumeMounts:
        - name: model-cache
          mountPath: /models
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
