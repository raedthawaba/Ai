apiVersion: v1
kind: Service
metadata:
  name: hajeen-api-service
  namespace: hajeen-platform
  labels:
    app: hajeen-api
spec:
  selector:
    app: hajeen-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
