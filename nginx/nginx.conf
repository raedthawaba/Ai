# ══════════════════════════════════════════════════════════════════════════════
# Nginx — Hajeen AI Platform Reverse Proxy (Production)
# ══════════════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: Hajeen API ──────────────────────────────────────────────────
    upstream hajeen_api {
        least_conn;
        server hajeen-api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grafana {
        server grafana:3000;
    }

    # ── Security Headers Map ──────────────────────────────────────────────────
    map $sent_http_content_type $x_content_options {
        default "nosniff";
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN:-localhost};

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Platform "Hajeen-AI/1.1.0" always;

        client_max_body_size 50M;

        # ── Health Check (Public) ─────────────────────────────────────────────
        location = /health {
            proxy_pass http://hajeen_api/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Auth Endpoints (Stricter Rate Limit) ──────────────────────────────
        location ~ ^/api/v1/auth/(login|register) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass         http://hajeen_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── AI Streaming Endpoints ────────────────────────────────────────────
        location ~ ^/api/v1/ai/(chat/stream|completion) {
            limit_req zone=ai_limit burst=10 nodelay;
            proxy_pass         http://hajeen_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://hajeen_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;
            proxy_pass         http://hajeen_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "keep-alive";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }

        # ── Swagger Docs ──────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://hajeen_api;
            proxy_set_header Host $host;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── HTTP-only (no SSL) for local dev ──────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass         http://hajeen_api;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }

        location /ws/ {
            proxy_pass         http://hajeen_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
        }
    }
}
